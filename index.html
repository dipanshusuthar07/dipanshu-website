<!DOCTYPE html>
<html>
<head>
<title>Test</title>
<style>
body { background:black; color:white; text-align:center; }

#chat-btn {
 position:fixed;
 bottom:20px;
 right:20px;
 background:blue;
 padding:10px;
}

#chat-page {
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:black;
 display:none;
}
</style>
</head>

<body>

<h1>TEST WORKING</h1>

<div id="chat-btn">Open</div>

<div id="chat-page">
  <h2>Chat Opened</h2>
</div>

<script>
document.getElementById("chat-btn").onclick = () => {
 document.getElementById("chat-page").style.display = "block";
};
</script>

</body>
</html>
