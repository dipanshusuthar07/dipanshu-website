<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dipanshu Suthar | Pianist</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* Header */
header {
  padding: 40px;
}

h1 {
  font-size: 2.5em;
}

/* Button */
#chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b82f6;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 1000;
}

/* Chat Page */
#chat-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: none;
  flex-direction: column;
}

/* Header */
#chat-header {
  background: #3b82f6;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* Messages */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  text-align: left;
}

/* Input */
#input {
  width: 100%;
  padding: 15px;
  border: none;
  outline: none;
}
</style>
</head>

<body>

<header>
  <h1>Dipanshu Suthar 🎹</h1>
  <p>Best Pianist of Kalorex Future School</p>
</header>

<!-- Chat Button -->
<div id="chat-btn">Chat</div>

<!-- Chat Page -->
<div id="chat-page">
  <div id="chat-header">
    AI Assistant
    <span id="close-chat" style="cursor:pointer;">Close</span>
  </div>

  <div id="messages"></div>

  <input id="input" placeholder="Type a message...">
</div>

<script>
// Open Close
const btn = document.getElementById("chat-btn");
const page = document.getElementById("chat-page");
const closeBtn = document.getElementById("close-chat");

btn.onclick = () => page.style.display = "flex";
closeBtn.onclick = () => page.style.display = "none";

// Chat Logic
const input = document.getElementById("input");
const messages = document.getElementById("messages");

function add(text) {
  let div = document.createElement("div");
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function reply(text) {
  text = text.toLowerCase();

  if (text.includes("name") || text.includes("who"))
    return "Dipanshu Suthar is a talented pianist.";

  if (text.includes("skill") || text.includes("music"))
    return "He plays keyboard and performs music.";

  if (text.includes("contact") || text.includes("email"))
    return "Email: dipanshusuthar07@gmail.com";

  if (text.includes("hire") || text.includes("concert"))
    return "Available for events across India.";

  return "Ask about music, skills, or contact.";
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    let text = input.value;

    add("You: " + text);

    let r = reply(text);

    setTimeout(() => {
      add("AI: " + r);
    }, 300);

    input.value = "";
  }
});
</script>

</body>
</html>
