<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="keywords" content="Dipanshu Suthar pianist, best pianist Kalorex, piano India">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dipanshu Suthar | Pianist</title>

<meta name="description" content="Dipanshu Suthar - Pianist, available for concerts and events across India.">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* Chat UI same as before */
#chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b82f6;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

#chat-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: none;
  flex-direction: column;
}

#chat-header {
  background: #3b82f6;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

#chat-messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.user {
  align-self: flex-end;
  background: #3b82f6;
  padding: 10px;
  border-radius: 10px;
}

.bot {
  align-self: flex-start;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

#chat-input {
  padding: 15px;
  border: none;
}

#mic {
  position: absolute;
  right: 10px;
  bottom: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Dipanshu Suthar 🎹</h1>
<p>Best Pianist of Kalorex Future School</p>

<div id="chat-btn">Chat</div>

<div id="chat-page">
  <div id="chat-header">
    AI Assistant
    <span id="close-chat">Close</span>
  </div>

  <div id="chat-messages"></div>

  <div style="position:relative;">
    <input id="chat-input" placeholder="Type a message...">
    <span id="mic">🎤</span>
  </div>
</div>

<script>
// OPEN CLOSE
const btn = document.getElementById("chat-btn");
const page = document.getElementById("chat-page");
const closeBtn = document.getElementById("close-chat");

btn.onclick = () => page.style.display = "flex";
closeBtn.onclick = () => page.style.display = "none";

// UI
const input = document.getElementById("chat-input");
const messages = document.getElementById("chat-messages");

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// BETTER AI LOGIC 🔥
function getReply(text) {
  text = text.toLowerCase();

  if (text.includes("name") || text.includes("who"))
    return "Dipanshu Suthar is a talented pianist and performer.";

  if (text.includes("skill") || text.includes("play") || text.includes("music"))
    return "He plays keyboard, performs music, and also enjoys table tennis.";

  if (text.includes("contact") || text.includes("email") || text.includes("address"))
    return "You can contact him at dipanshusuthar07@gmail.com";

  if (text.includes("hire") || text.includes("concert") || text.includes("show"))
    return "He is available for concerts and events across India.";

  return "I understand your question, but I can best help with music, skills or contact.";
}

// VOICE AI 🔥
const mic = document.getElementById("mic");
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

mic.onclick = () => {
  recognition.start();
};

recognition.onresult = function(event) {
  let voiceText = event.results[0][0].transcript;
  input.value = voiceText;
};

// TEXT TO SPEECH
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

// SEND
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    let text = input.value;

    addMessage(text, "user");

    let reply = getReply(text);

    setTimeout(() => {
      addMessage(reply, "bot");
      speak(reply); // voice reply 🔥
    }, 400);

    input.value = "";
  }
});
</script>

</body>
</html>
